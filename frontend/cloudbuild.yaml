steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_API_URL=$_API_URL
      - --build-arg
      - VITE_GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID
      - -t
      - $_IMAGE
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, $_IMAGE]
images: [$_IMAGE]
